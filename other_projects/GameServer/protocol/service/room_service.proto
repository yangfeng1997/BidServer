syntax = "proto3";

package protocol.service;

import "google/protobuf/empty.proto";
import "protocol/common/options.proto";

option go_package = "project/protocol/service;servicepb";

message RPC_JoinRoom_Req {}
message RPC_JoinRoom_Rsp {}
message RPC_LeaveRoom_Ntf {}

service RoomService {
  option (protocol.common.kind) = BACKEND;
  option (protocol.common.server_type) = ST_ROOMSVR;

  rpc JoinRoom(RPC_JoinRoom_Req) returns (RPC_JoinRoom_Rsp);
  rpc LeaveRoom(RPC_LeaveRoom_Ntf) returns (google.protobuf.Empty);
}
