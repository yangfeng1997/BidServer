syntax = "proto3";

package protocol.service;

import "google/protobuf/empty.proto";
import "protocol/common/options.proto";

option go_package = "project/protocol/service;servicepb";

message RPC_QueryOnline_Req {}
message RPC_QueryOnline_Rsp {}
message RPC_Ping_Ntf {}

service OnlineService {
  option (protocol.common.kind) = BACKEND;
  option (protocol.common.server_type) = ST_ONLINESVR;

  rpc QueryOnline(RPC_QueryOnline_Req) returns (RPC_QueryOnline_Rsp);
  rpc Ping(RPC_Ping_Ntf) returns (google.protobuf.Empty);
}
