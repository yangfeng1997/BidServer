syntax = "proto3";

package protocol.handler;

import "google/protobuf/empty.proto";
import "protocol/common/options.proto";

option go_package = "project/protocol/handler;handlerpb";

service OnlineHandler {
  option (protocol.common.kind) = FRONTEND;
  option (protocol.common.server_type) = ST_ONLINESVR;

  rpc QueryOnline(CS_QueryOnline_Req) returns (SC_QueryOnline_Rsp);
  rpc Ping(CS_Ping_Ntf) returns (google.protobuf.Empty);
}

message CS_QueryOnline_Req {
  option (protocol.common.cmd_id) = 2300;
}
message SC_QueryOnline_Rsp {
  option (protocol.common.cmd_id) = 2301;
}
message CS_Ping_Ntf {
  option (protocol.common.cmd_id) = 2302;
  option (protocol.common.no_auth) = true;
}
