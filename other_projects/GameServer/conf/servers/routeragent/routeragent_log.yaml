log:
  main:
    level: info
    format: console
    stderr_also: true
    dir: "${log_dir}"
    basename: routeragent
    max_size_mb: 100
    max_backups: 72
    rotate_by_hour: true
  res:
    level: info
    format: console
    dir: "${log_dir}"
    basename: routeragent_res
    max_size_mb: 100
    max_backups: 72
    rotate_by_hour: true
  tracing:
    level: debug
    format: json
    dir: "${log_dir}"
    basename: routeragent_trace
    max_size_mb: 200
    max_backups: 168
    rotate_by_hour: true
