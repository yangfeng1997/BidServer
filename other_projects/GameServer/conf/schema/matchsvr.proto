syntax = "proto3";

package conf.schema;

import "conf/schema/types.proto";
import "conf/schema/options.proto";

option go_package = "project/conf/schema/gen;gen";

message MatchsvrConfig {
  MatchConfig match = 1;
  LogGroupConfig log = 2;
}

message MatchConfig {
  string log_level    = 1 [(conf.schema.reload) = true, (conf.schema.enum_values) = "debug,info,warn,error"];
  int32  match_tick_ms = 2 [(conf.schema.reload) = true];
}
