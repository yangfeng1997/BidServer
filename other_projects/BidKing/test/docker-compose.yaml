services:
  nats:
    image: nats:2.10
    ports:
      - "4222:4222"
  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    environment:
      - ETCD_ADVERTISE_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    ports:
      - "2379:2379"
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
