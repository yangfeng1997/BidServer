listen_tcp: "${gate_listen_tcp}"
listen_ws:  "${gate_listen_ws}"
max_conn: 10000
heartbeat_sec: 30


logger_group:
  main:
    level: info
    format: console
    stderr_also: true
    dir: "${log_dir}"
    basename: gatesvr
    max_size_mb: 100
    max_backups: 72
    rotate_by_hour: true
  res:
    level: info
    format: console
    stderr_also: true
    dir: "${log_dir}"
    basename: gatesvr
    max_size_mb: 100
    max_backups: 72
    rotate_by_hour: true
  tracing:
    level: info
    format: console
    stderr_also: true
    dir: "${log_dir}"
    basename: gatesvr
    max_size_mb: 100
    max_backups: 72
    rotate_by_hour: true
