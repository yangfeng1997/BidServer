syntax = "proto3";

package config;

import "google/protobuf/descriptor.proto";

option go_package = "project/config/gen;configgen";

extend google.protobuf.MessageOptions {
  bool root = 50001;
  bool common = 50002;
  string server = 50003;
}

extend google.protobuf.FieldOptions {
  bool reload = 50005;
  bool required = 50006;
  bool env = 50007;
  string enum_values = 50008;
}