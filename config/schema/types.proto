syntax = "proto3";

package config;

import "config/schema/options.proto";

option go_package = "project/config/gen;configgen";

message LogConfig {
  string level = 1 [(config.enum_values) = "debug,info,warn,error,fatal"];
  string format = 2 [(config.enum_values) = "console,json"];
  bool stderr_also = 3;
  string dir = 4 [(config.required) = true, (config.env) = true];
  string basename = 5 [(config.required) = true];
  int32 max_size_mb = 6;
  int32 max_backups = 7;
  bool rotate_by_hour = 8;
}
