max_player: 5000
heartbeat_sec: 30
listen_addr: "${lobby_listen_addr}"

logger_group:
  main:
    level: info
    format: console
    stderr_also: true
    dir: "${log_dir}"
    basename: gatesvr
    max_size_mb: 100
    max_backups: 72
    rotate_by_hour: true
  res:
    level: info
    format: console
    stderr_also: true
    dir: "${log_dir}"
    basename: gatesvr
    max_size_mb: 100
    max_backups: 72
    rotate_by_hour: true
  tracing:
    level: info
    format: console
    stderr_also: true
    dir: "${log_dir}"
    basename: gatesvr
    max_size_mb: 100
    max_backups: 72
    rotate_by_hour: true
