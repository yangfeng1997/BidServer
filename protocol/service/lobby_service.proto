syntax = "proto3";

package protocol.service;

import "google/protobuf/empty.proto";
import "protocol/common/options.proto";

option go_package = "project/protocol/service;servicepb";

message RPC_Login_Req {}
message RPC_Login_Rsp {}
message RPC_PlayerDisconnect_Ntf {}

service LobbyService {
  option (protocol.common.kind) = BACKEND;
  option (protocol.common.server_type) = ST_LOBBYSVR;

  rpc Login(RPC_Login_Req) returns (RPC_Login_Rsp);
  rpc PlayerDisconnect(RPC_PlayerDisconnect_Ntf) returns (google.protobuf.Empty);
}
